# Example Seaborg Lichess bot configuration.
#
# Every field is optional; the values shown here are the built-in defaults that
# apply when the file (or an individual field) is absent. Copy this to
# `seaborg-lichess.toml` in the working directory, or point at it explicitly with
# `seaborg lichess --config PATH`, and edit what you need.

# Most games to play at once. Challenges that would exceed this are declined
# until a game finishes.
max_concurrent_games = 1

[challenge]
# Accepted variant keys (Lichess `variant.key` values). Standard chess only by
# default.
variants = ["standard"]

# Accept rated and/or casual challenges.
accept_rated = true
accept_casual = true

# Accept challenges from other bots and/or from humans.
accept_bots = false
accept_humans = true

# Clock bounds, in seconds, applied to the initial time and the increment.
min_initial_seconds = 60
max_initial_seconds = 1800
min_increment_seconds = 0
max_increment_seconds = 60

# Opponent rating bounds in the relevant pool.
min_rating = 0
max_rating = 4000

# Accept games with no real-time clock (correspondence or unlimited). The engine
# is built for clocked play, so this is off by default.
accept_unlimited = false

# Incoming allow/block lists, by account id (the lowercase form of a username),
# matched case-insensitively. When `allow_list` is non-empty, only listed accounts
# may challenge the bot; anyone on `block_list` is always refused. Both empty by
# default, imposing no restriction.
allow_list = []
block_list = []

# Most simultaneous games a single account may hold against the bot. A further
# challenge from an account already at this limit is declined (reason `later`)
# rather than taking another slot, so one opponent cannot monopolise the board.
# 0 (the default) imposes no per-account limit; `max_concurrent_games` still caps
# the total.
max_games_per_user = 0

[engine]
# Transposition table size in mebibytes.
hash_mb = 64

# Time subtracted from each move's budget to cover network and scheduling
# latency, in milliseconds.
move_overhead_ms = 100

[matchmaking]
# Proactively challenge other bots when idle. Off by default: with `enabled`
# false the bot is purely reactive and every other field in this section is
# ignored. The rest of this section takes effect only once matchmaking is on.
enabled = false

# Variant keys, initial clock times (seconds), and increments (seconds) to draw
# from when composing a challenge. Successive challenges rotate through each pool.
variants = ["standard"]
initial_seconds = [60, 180, 300]
increment_seconds = [0, 2, 3]

# Only challenge bots whose rating for the chosen time control's speed falls
# within these inclusive bounds. A bot with no rating for that speed is skipped.
min_rating = 0
max_rating = 4000

# Whether issued challenges are "rated", "casual", or "random" (alternating).
# Casual by default: rated challenges to bots are frequently rejected at creation
# (many bots, such as the Maia family, accept only casual games), so "rated" or
# "random" can make a share of outgoing challenges fail until an accepting
# opponent is found.
mode = "casual"

# How long the bot must be idle (no games running) before it seeks an opponent,
# and the minimum gap between successive outgoing challenges, both in seconds.
idle_timeout_seconds = 30
min_challenge_interval_seconds = 30

# Concurrent-game slots held back from matchmaking so a human can always still
# challenge the bot. Matchmaking treats its cap as
# `max_concurrent_games - reserved_human_slots`, so this must be below that cap.
reserved_human_slots = 0

# Account ids never to challenge, however eligible they otherwise look.
block_list = []

# After a bot declines a challenge, how long to avoid re-challenging that same
# bot, in seconds.
decline_backoff_seconds = 3600
