[workspace]
members = ["core", "engine"]

[package]
name = "seaborg"
version = "0.1.0"
authors = ["George Seabridge <georgeseabridge@gmail.com>"]
edition = "2021"
license = "MIT"

[dependencies]
chess_core = { package = "core", path = "./core" }
engine = { path = "./engine" }
clap = { version = "4.6.2", features = ["derive"] }
log = { version = "0.4", features = ["max_level_trace", "release_max_level_trace"] }
separator = "0.4"
simple_logger = { version = "5.2.0", features = ["stderr"] }

[dev-dependencies]
criterion = "0.8.2"

[[bench]]
name = "perft"
harness = false

[[bench]]
name = "movegen"
harness = false

[[bench]]
name = "search"
harness = false

[[bench]]
name = "bb"
harness = false

[[bench]]
name = "square"
harness = false

[[bench]]
name = "tt"
harness = false
